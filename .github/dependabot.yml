version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "[skip ci] "

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "[skip ci] "

  - package-ecosystem: "uv"
    directory: "/tools/gov-archive"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "[skip ci] "

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "[skip ci] "
