name: lint
on:
  push:
    branches: [main]
  pull_request:

jobs:
  formatter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: "Run ESLint/Priettier"
        run: |
          npm ci
          npm run lint
          npm run format:check

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: "Validate YAML frontmatter in agents/skills/prompts"
        run: |
          pip install pyyaml
          python scripts/lint_frontmatter.py
